<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タスクバーヒーロー箱ドロップ管理</title>
  <style>
    :root {
      --bg: #10131a;
      --panel: #181d27;
      --panel2: #202736;
      --text: #f2f5fb;
      --muted: #aab3c5;
      --accent: #5cc8ff;
      --ok: #38d47a;
      --wait: #ffcf5c;
      --danger: #ff5c7a;
      --line: #30394d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 20px;
      background: linear-gradient(135deg, #152033, #10131a);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .number-stepper {
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      gap: 8px;
      align-items: center;
    }

    .step-btn {
      min-height: 48px;
      font-size: 26px;
      line-height: 1;
      border-radius: 12px;
      touch-action: manipulation;
      user-select: none;
    }

    input[type="number"], input[type="range"] {
      width: 100%;
    }

    input[type="number"] {
      min-height: 48px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      font-size: 18px;
      text-align: center;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--panel2);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      transition: transform .05s ease, filter .1s ease, background .15s ease;
    }

    button:hover { filter: brightness(1.12); }
    button:active { transform: translateY(1px); }

    .primary { background: #176b9a; }
    .danger { background: #9b2540; }

    .preset-row, .sound-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .stage {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      position: relative;
      overflow: hidden;
    }

    .stage.ready {
      border-color: rgba(56, 212, 122, .8);
      background: linear-gradient(135deg, rgba(56,212,122,.23), var(--panel));
    }

    .stage.waiting {
      border-color: rgba(255, 207, 92, .55);
      background: linear-gradient(135deg, rgba(255,207,92,.16), var(--panel));
    }

    .stage-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .difficulty {
      color: var(--muted);
      font-size: 13px;
    }

    .stage-name {
      font-size: 22px;
      font-weight: 900;
    }

    .box-level {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .timer {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .03em;
      margin: 8px 0 10px;
    }

    .status {
      color: var(--muted);
      min-height: 22px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .last-stage-drop {
      color: var(--accent);
      min-height: 22px;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .top-status {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 18px 0;
    }

    .global-last-drop {
      color: var(--accent);
      font-size: 20px;
      font-weight: 900;
      padding: 12px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }

    .stage.normal {
      border-color: rgba(255,255,255,.45);
    }

    .stage.nightmare {
      border-color: rgba(170, 95, 255, .75);
    }

    .stage.hell {
      border-color: rgba(255, 92, 122, .75);
    }

    .stage.torment {
      border-color: rgba(255, 156, 64, .8);
    }

    .stage.normal .difficulty { color: #ffffff; }
    .stage.nightmare .difficulty { color: #bb8cff; }
    .stage.hell .difficulty { color: #ff5c7a; }
    .stage.torment .difficulty { color: #ff9c40; }










    .disclaimer {
      max-width: 1200px;
      margin: 18px auto 0;
      padding: 0 18px 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    .stage-actions {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 8px;
    }

    .stage-actions button {
      min-height: 44px;
    }

    .manual-ready {
      background: #9b2540;
      width: 40px !important;
      height: 40px !important;
      min-height: 40px !important;
      padding: 0 !important;
      font-size: 18px;
      opacity: 0.85;
      justify-self: end;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-btn.dropped { background: #936b13; }
    .manual-ready { background: #9b2540; }

    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.5;
    }

    .log-section {
      margin-top: 18px;
    }

    .toggle-log {
      flex: 1 1 240px;
      min-height: 48px;
      background: #263248;
      font-size: 16px;
    }

    .log-content {
      display: none;
      margin-top: 12px;
    }

    .log-content.open {
      display: block;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .summary-item {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .summary-item strong {
      display: block;
      font-size: 18px;
      margin-top: 4px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
      background: var(--panel);
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      background: var(--panel2);
      position: sticky;
      top: 0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    footer {
      color: var(--muted);
      text-align: center;
      padding: 18px;
      font-size: 12px;
    }
  
    /* 宝箱演出 */
    .chest-effect-toggle {
      width: 100%;
      min-height: 48px;
      background: #263248;
      font-size: 16px;
    }

    .screen-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 9999;
      background: rgba(255,255,255,.92);
    }

    .screen-flash.flash {
      animation: screenFlash .45s ease forwards;
    }

    .drop-effect-layer {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(92vw, 320px);
      height: 250px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
      z-index: 8000;
    }

    .drop-effect-layer.show {
      display: block;
      animation: effectLayerFade 3s ease forwards;
    }

    .effect-chest {
      --chest-main: #2f6fb8;
      --glow: rgba(47,111,184,.62);
      position: absolute;
      left: 50%;
      bottom: 24px;
      width: 150px;
      height: 102px;
      transform: translateX(-50%) scale(.2);
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.55));
      animation: effectChestMotion 3s ease forwards;
      z-index: 4;
    }

    .effect-chest-lid {
      position: absolute;
      width: 150px;
      height: 40px;
      left: 0;
      top: 7px;
      background: var(--chest-main);
      border: 5px solid rgba(255,255,255,.24);
      border-bottom: 6px solid rgba(0,0,0,.35);
      border-radius: 17px 17px 6px 6px;
      transform-origin: center bottom;
      animation: effectLidOpen 3s ease forwards;
      z-index: 7;
      overflow: hidden;
    }

    .effect-chest-lid::after {
      content: "";
      position: absolute;
      left: 0;
      top: 16px;
      width: 100%;
      height: 4px;
      background: rgba(255,230,130,.85);
    }

    .effect-chest-box {
      position: absolute;
      width: 150px;
      height: 60px;
      left: 0;
      bottom: 0;
      background: var(--chest-main);
      border: 5px solid rgba(255,255,255,.24);
      border-top: 7px solid rgba(0,0,0,.35);
      border-radius: 7px 7px 17px 17px;
      z-index: 5;
      overflow: hidden;
    }

    .effect-chest-box::after {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,.18);
    }

    .effect-lock {
      position: absolute;
      left: 50%;
      bottom: 23px;
      width: 30px;
      height: 24px;
      transform: translateX(-50%);
      border-radius: 9px;
      background: #ffe678;
      border: 4px solid rgba(0,0,0,.35);
      z-index: 9;
    }

    .effect-inner-light {
      position: absolute;
      left: 50%;
      bottom: 54px;
      width: 120px;
      height: 58px;
      transform: translateX(-50%) scale(.25);
      background: radial-gradient(circle, rgba(255,255,210,.95), transparent 68%);
      border-radius: 50%;
      opacity: 0;
      z-index: 3;
      animation: effectInnerLight 3s ease forwards;
    }

    .effect-aura {
      position: absolute;
      left: 50%;
      bottom: 48px;
      width: 210px;
      height: 150px;
      transform: translateX(-50%) scale(.3);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, var(--glow), transparent 66%);
      animation: effectAuraBurst 3s ease forwards;
      z-index: 1;
    }

    .effect-item {
      --item-color: #ffffff;
      --item-outline: #000000;
      position: absolute;
      left: 50%;
      bottom: 72px;
      width: 36px;
      height: 36px;
      transform: translateX(-50%) translateY(80px) scale(.25) rotate(45deg);
      background: var(--item-color);
      clip-path: polygon(50% 0%, 92% 28%, 72% 100%, 28% 100%, 8% 28%);
      opacity: 0;
      z-index: 8;
      box-shadow: 0 0 24px var(--item-color), 0 0 56px var(--item-color);
      filter:
        drop-shadow(0 0 2px var(--item-outline))
        drop-shadow(0 0 2px var(--item-outline))
        drop-shadow(0 0 2px var(--item-outline))
        drop-shadow(0 0 10px var(--item-color));
      animation: effectItemFly 3s ease forwards;
    }

    .effect-item::after {
      content: "";
      position: absolute;
      inset: 7px;
      background: rgba(255,255,255,.24);
      clip-path: inherit;
      pointer-events: none;
    }

    .effect-item.white { --item-color: #b0b0b0; --item-outline:#1d1d1d; }
    .effect-item.yellow { --item-color: #ffd84d; --item-outline:#000000; }
    .effect-item.red { --item-color: #ff3b4f; --item-outline:#ffffff; }
    .effect-item.purple { --item-color: #a45cff; --item-outline:#fff3a0; }

    .effect-item.rainbow {
      --item-outline: transparent;
      clip-path: polygon(50% 0%, 61% 34%, 98% 34%, 68% 55%, 79% 91%, 50% 70%, 21% 91%, 32% 55%, 2% 34%, 39% 34%);
      background: linear-gradient(90deg, #ff3b4f, #ffb13b, #fff23b, #38d47a, #2f8cff, #a45cff, #ff3b4f);
      background-size: 260% 260%;
      filter:
        drop-shadow(0 0 10px #ffffff)
        drop-shadow(0 0 22px #ffeb3b)
        drop-shadow(0 0 34px #2f8cff);
      animation: effectRainbowMove .75s linear infinite, effectItemFlyRainbow 3s ease forwards;
    }

    .effect-item.boots {
      width: 78px;
      height: 48px;
      clip-path: none;
      background: transparent;
      box-shadow: none;
      filter: none;
      animation: effectItemFlyNoRotate 3s ease forwards;
    }

    .effect-item.boots::before,
    .effect-item.boots::after {
      content: "";
      position: absolute;
      top: 4px;
      width: 30px;
      height: 38px;
      border: 3px solid #20242d;
      border-radius: 10px 10px 5px 5px;
      background: linear-gradient(180deg, #ffffff 0%, #cfd7df 42%, #7e8792 100%);
      clip-path: polygon(17% 0%, 78% 0%, 78% 58%, 100% 58%, 100% 100%, 6% 100%, 6% 62%, 17% 62%);
      box-shadow:
        0 0 0 2px #eef3f8 inset,
        0 0 12px #f4f8ff;
    }

    .effect-item.boots::before {
      left: 10px;
      transform: rotate(-7deg);
      z-index: 3;
    }

    .effect-item.boots::after {
      left: 34px;
      transform: rotate(5deg);
      z-index: 2;
      opacity: .95;
    }

    .effect-item.crystal {
      width: 48px;
      height: 48px;
      --item-color: #9ff8ff;
      --item-outline: #15192b;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 25%, #ffffff 0%, #eaffff 16%, transparent 18%),
        radial-gradient(circle at 42% 36%, #bffcff 0%, #4de1f2 45%, #0c8eaa 100%);
      clip-path: none;
      animation: effectItemFlyNoRotate 3s ease forwards;
      box-shadow:
        0 0 0 4px #15192b,
        0 0 18px #9ff8ff,
        0 0 42px #45dfff;
    }

    .effect-item.crystal::after {
      content: "";
      position: absolute;
      inset: 8px 11px 18px 11px;
      border-radius: 50%;
      background: rgba(255,255,255,.65);
      clip-path: none;
      filter: blur(.5px);
    }

    .effect-beam {
      position: absolute;
      left: 50%;
      bottom: 62px;
      width: 12px;
      height: 145px;
      transform: translateX(-50%) scaleY(.2);
      transform-origin: bottom;
      background: linear-gradient(to top, var(--item-color), transparent);
      opacity: 0;
      filter: blur(1px);
      z-index: 2;
      animation: effectBeamRise 3s ease forwards;
    }

    .effect-sparkles {
      position: absolute;
      inset: 0;
      z-index: 10;
      opacity: 0;
      animation: effectSparkleShow 3s ease forwards;
    }

    .effect-sparkles span {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--item-color);
      box-shadow:
        0 0 8px var(--item-color),
        0 0 18px var(--item-color),
        0 0 30px rgba(255,255,255,.55);
      animation: effectSparkleMove 1s ease-in-out infinite;
    }

    .effect-sparkles span::before,
    .effect-sparkles span::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--item-color);
      border-radius: 99px;
    }

    .effect-sparkles span::before { width: 22px; height: 3px; }
    .effect-sparkles span::after { width: 3px; height: 22px; }

    .effect-sparkles span:nth-child(1){ left: 30%; top: 24%; animation-delay: 0s; }
    .effect-sparkles span:nth-child(2){ right: 28%; top: 18%; animation-delay: .12s; }
    .effect-sparkles span:nth-child(3){ left: 38%; bottom: 28%; animation-delay: .24s; }
    .effect-sparkles span:nth-child(4){ right: 36%; bottom: 34%; animation-delay: .36s; }
    .effect-sparkles span:nth-child(5){ left: 48%; top: 6%; animation-delay: .48s; }
    .effect-sparkles span:nth-child(6){ right: 44%; bottom: 16%; animation-delay: .60s; }

    @keyframes effectChestMotion {
      0% { transform: translateX(-50%) scale(.2); opacity: 0; }
      12% { transform: translateX(-50%) scale(.84); opacity: 1; }
      22% { transform: translateX(-50%) scale(.78) translateY(0); }
      34% { transform: translateX(-50%) scale(.8) translateY(-16px) rotate(-3deg); }
      42% { transform: translateX(-50%) scale(.8) translateY(0) rotate(3deg); }
      50% { transform: translateX(-50%) scale(.8) translateY(-7px) rotate(-1deg); }
      58% { transform: translateX(-50%) scale(.8) translateY(0) rotate(0); }
      88% { transform: translateX(-50%) scale(.8); opacity: 1; }
      100% { transform: translateX(-50%) scale(.72); opacity: 0; }
    }

    @keyframes effectLidOpen {
      0%, 54% { transform: translateY(0) rotate(0deg); }
      68% { transform: translateY(-60px) rotate(-9deg); }
      88% { transform: translateY(-48px) rotate(-6deg); opacity: 1; }
      100% { transform: translateY(-48px) rotate(-6deg); opacity: 0; }
    }

    @keyframes effectItemFly {
      0%, 56% { opacity: 0; transform: translateX(-50%) translateY(80px) scale(.25) rotate(45deg); }
      66% { opacity: 1; transform: translateX(-50%) translateY(-36px) scale(1.12) rotate(45deg); }
      86% { opacity: 1; transform: translateX(-50%) translateY(-80px) scale(1) rotate(45deg); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-106px) scale(.86) rotate(45deg); }
    }

    @keyframes effectItemFlyRainbow {
      0%, 56% { opacity: 0; transform: translateX(-50%) translateY(80px) scale(.25) rotate(0deg); }
      66% { opacity: 1; transform: translateX(-50%) translateY(-36px) scale(1.22) rotate(180deg); }
      86% { opacity: 1; transform: translateX(-50%) translateY(-80px) scale(1.05) rotate(540deg); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-106px) scale(.9) rotate(720deg); }
    }

    @keyframes effectItemFlyNoRotate {
      0%, 56% { opacity: 0; transform: translateX(-50%) translateY(80px) scale(.25); }
      66% { opacity: 1; transform: translateX(-50%) translateY(-36px) scale(1.12); }
      86% { opacity: 1; transform: translateX(-50%) translateY(-80px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-106px) scale(.86); }
    }

    @keyframes effectBeamRise {
      0%, 56% { opacity: 0; transform: translateX(-50%) scaleY(.15); }
      66% { opacity: .88; transform: translateX(-50%) scaleY(1); }
      86% { opacity: .52; transform: translateX(-50%) scaleY(.92); }
      100% { opacity: 0; transform: translateX(-50%) scaleY(.8); }
    }

    @keyframes effectInnerLight {
      0%, 54% { opacity: 0; transform: translateX(-50%) scale(.3); }
      66% { opacity: 1; transform: translateX(-50%) scale(1.1); }
      88% { opacity: .75; transform: translateX(-50%) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.15); }
    }

    @keyframes effectAuraBurst {
      0%, 54% { opacity: 0; transform: translateX(-50%) scale(.3); }
      66% { opacity: .92; transform: translateX(-50%) scale(1.08); }
      88% { opacity: .48; transform: translateX(-50%) scale(.98); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.2); }
    }

    @keyframes effectSparkleShow {
      0%, 56% { opacity: 0; }
      66% { opacity: 1; }
      88% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes effectSparkleMove {
      0%, 100% { transform: translateY(0) scale(.55) rotate(0deg); opacity: .35; }
      50% { transform: translateY(-16px) scale(1.25) rotate(18deg); opacity: 1; }
    }

    @keyframes effectLayerFade {
      0%, 90% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes effectRainbowMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 320% 50%; }
    }

    @keyframes screenFlash {
      0% { opacity: 0; }
      18% { opacity: .95; }
      100% { opacity: 0; }
    }

  
    /* v17 折りたたみ・周回時間 */
    .collapsible-card .collapse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 10px;
    }
    .collapsible-card .collapse-header label { margin: 0; cursor: pointer; }
    .collapse-toggle {
      width: 34px;
      min-height: 30px;
      padding: 0;
      border-radius: 8px;
      background: #263248;
      font-size: 16px;
    }
    .collapsible-card.collapsed .collapse-body { display: none; }
    .speaker-btn { min-width: 52px; font-size: 22px; padding: 8px 10px; }
    .stage.runnable {
      border-color: rgba(92, 200, 255, .9);
      background: linear-gradient(135deg, rgba(92,200,255,.22), var(--panel));
    }
    .run-time-label {
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 8px;
      min-height: 20px;
    }
    .area-time-section { margin-top: 18px; }
    .area-time-content { display: none; margin-top: 12px; }
    .area-time-content.open { display: block; }
    .area-time-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .area-time-item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .area-time-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .area-time-item input {
      width: 100%;

<h1>タスクバーヒーロー箱ドロップ管理</h1>
<button class="view-toggle-btn" id="viewToggleBtn" type="button">シンプル</button>
</div>
    <div class="note">
      ドロップを押すと、設定したクールダウンでカウント開始。時間が来たら音が鳴り、対象のレベルが緑になります。
    </div>
  </header>

  <section class="top-status">
    <div class="global-last-drop">
      <span class="global-label-full">最終ドロップから：</span><span class="global-label-simple">前回：</span><span id="globalLastDropElapsed">未記録</span>
    </div>
  </section>

  <main>
    <section class="controls">
      <div class="card collapsible-card" id="mainSettingsCard">
        <div class="collapse-header" onclick="toggleCard('mainSettingsCard')">
          <label>基本設定</label>
          <button class="collapse-toggle" type="button">▼</button>
        </div>
        <div class="collapse-body">
          <div class="settings-stack">
            <div class="settings-block">
              <label>クールダウン時間（分） 1〜1000</label>
              <div class="number-stepper">
                <button class="step-btn" onclick="stepCooldown(-1)" aria-label="1分減らす">−</button>
                <input id="cooldownInput" type="number" min="1" max="1000" step="1" value="6" inputmode="numeric" />
                <button class="step-btn" onclick="stepCooldown(1)" aria-label="1分増やす">＋</button>
              </div>
              <div class="preset-row" style="margin-top:10px;">
                <button class="primary" onclick="setPreset(6)">6分</button>
                <button class="primary" onclick="setPreset(12)">12分</button>
              </div>
            </div>

            <div class="settings-block">
              <label>サウンド</label>
              <div class="sound-row">
                <button id="muteBtn" class="speaker-btn" onclick="toggleMute()" title="サウンドON">🔊</button>
                <button onclick="testSound()">音テスト</button>
              </div>
              <label style="margin-top:12px;">音量：<span id="volumeLabel">50</span>%（0〜200%）</label>
              <input id="volumeSlider" type="range" min="0" max="200" value="50" />
            </div>

            <div class="settings-block">
              <label>宝箱演出</label>
              <button id="chestEffectBtn" class="chest-effect-toggle" onclick="toggleChestEffect()">宝箱演出ON</button>
            </div>

            <div class="settings-block">
              <label>一括操作</label>
              <div class="preset-row">
                <button class="danger" onclick="resetAll()">ドロップ状況リセット</button>
                <button class="danger" onclick="clearLogs()">ログを全て削除</button>
              </div>
              <div class="small">ドロップ状況リセットは全ステージを未ドロップ状態に戻す。ログ削除は集計と履歴を消す。</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="stageGrid" class="stage-grid"></section>

    <section class="log-section">
      <div class="preset-row">
        <button class="section-toggle-btn" onclick="toggleLog()">
          <span>集計・ログ</span>
          <span id="logToggleArrow" class="toggle-arrow">▶</span>
        </button>
      </div>
      <div id="logContent" class="log-content">
        <div class="card">
          <button class="log-csv-small" onclick="downloadCsv()">CSVで保存</button>
        </div>

        <div class="card">
          <label>箱レベル別ドロップ集計</label>
          <div id="summaryGrid" class="summary-grid"></div>
        </div>

        <div class="card" style="margin-top:12px;">
          <label>ドロップログ</label>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>時刻</th>
                  <th>難易度</th>
                  <th>ステージ</th>
                  <th>箱レベル</th>
                  <th>前回からのドロップ時間</th>
                </tr>
              </thead>
              <tbody id="logTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  
    <section class="area-time-section">
      <button class="section-toggle-btn" onclick="toggleAreaTimes()">
        <span>各エリアの周回時間</span>
        <span id="areaToggleArrow" class="toggle-arrow">▶</span>
      </button>
      <div id="areaTimeContent" class="area-time-content">
        <div class="card">
          <label>各エリアの周回時間（秒）</label>
          <div class="preset-row" style="margin-bottom:12px;">
            <button onclick="exportAreaTimesCsv()">時間出力（CSV）</button>
            <button onclick="document.getElementById('areaTimeCsvInput').click()">時間取り込み（CSV）</button>
            <input id="areaTimeCsvInput" class="hidden-file-input" type="file" accept=".csv,text/csv" />
          </div>
          <div id="areaTimeGrid" class="area-time-grid"></div>
          <div class="small">各エリアの周回時間を入力すると再周回の表示が追加されます。</div>
        </div>
      </div>
    </section>

  </main>


  <div id="screenFlash" class="screen-flash"></div>
  <div id="dropEffectLayer" class="drop-effect-layer">
    <div id="effectChest" class="effect-chest blue">
      <div class="effect-aura"></div>
      <div id="effectBeam" class="effect-beam"></div>
      <div class="effect-inner-light"></div>
      <div id="effectItem" class="effect-item white"></div>
      <div id="effectChestLid" class="effect-chest-lid"></div>
      <div id="effectChestBox" class="effect-chest-box"></div>
      <div class="effect-lock"></div>
      <div class="effect-sparkles">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="disclaimer">
    このサイトは非公式のファンメイドツールです。Taskbar Hero公式および関係者とは関係ありません。
  </div>

  <script>
    const stages = [
      { difficulty: "ノーマル", stage: "1-1", boxLevel: 1 },
      { difficulty: "ノーマル", stage: "1-4", boxLevel: 5 },
      { difficulty: "ノーマル", stage: "1-8", boxLevel: 10 },
      { difficulty: "ノーマル", stage: "2-3", boxLevel: 15 },
      { difficulty: "ノーマル", stage: "2-8", boxLevel: 20 },
      { difficulty: "ノーマル", stage: "3-8", boxLevel: 30 },
      { difficulty: "ナイトメア", stage: "1-9", boxLevel: 40 },
      { difficulty: "ナイトメア", stage: "3-5", boxLevel: 50 },
      { difficulty: "ヘル", stage: "2-5", boxLevel: 65 },
      { difficulty: "トーメント", stage: "1-3", boxLevel: 80 },
    ];

    let cooldownMinutes = 6;
    let muted = false;
    let volume = 0.5;
    let timers = {};
    let dropLogs = [];
    let lastDropByBoxLevel = {};
    let lastDropByStage = {};
    let globalLastDropTime = null;
    let areaRunTimes = {};
    let areaRunNotified = {};
    let chestEffectEnabled = true;
    let chestEffectTimer = null;

    const grid = document.getElementById("stageGrid");
    const cooldownInput = document.getElementById("cooldownInput");
    const volumeSlider = document.getElementById("volumeSlider");
    const volumeLabel = document.getElementById("volumeLabel");
    const muteBtn = document.getElementById("muteBtn");
    const logContent = document.getElementById("logContent");
    const summaryGrid = document.getElementById("summaryGrid");
    const logTableBody = document.getElementById("logTableBody");

    function stageKey(item) {
      return `${item.difficulty}-${item.stage}`;
    }

    function difficultyClass(difficulty) {
      if (difficulty === "ノーマル") return "normal";
      if (difficulty === "ナイトメア") return "nightmare";
      if (difficulty === "ヘル") return "hell";
      if (difficulty === "トーメント") return "torment";
      return "";
    }

    function clampCooldown(value) {
      let n = Number(value);
      if (!Number.isFinite(n)) n = 1;
      n = Math.trunc(n);
      if (n < 1) n = 1;
      if (n > 1000) n = 1000;
      return n;
    }

    function syncCooldownInput() {
      const fixed = clampCooldown(cooldownInput.value);
      cooldownInput.value = fixed;
      cooldownMinutes = fixed;
    }

    cooldownInput.addEventListener("input", syncCooldownInput);
    cooldownInput.addEventListener("change", syncCooldownInput);
    cooldownInput.addEventListener("blur", syncCooldownInput);

    function stepCooldown(delta) {
      const current = clampCooldown(cooldownInput.value);
      cooldownInput.value = clampCooldown(current + delta);
      syncCooldownInput();
    }


    function toggleCard(cardId) {
      const card = document.getElementById(cardId);
      if (!card) return;
      card.classList.toggle("collapsed");
      const btn = card.querySelector(".collapse-toggle");
      if (btn) btn.textContent = card.classList.contains("collapsed") ? "▶" : "▼";
    }

    function playRunReadySound() {
      if (muted || volume <= 0) return;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const gain = ctx.createGain();
      gain.gain.value = volume * 0.22;
      gain.connect(ctx.destination);
      const notes = [523, 659, 784, 1046];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = "triangle";
        osc.frequency.value = freq;
        osc.connect(gain);
        const start = ctx.currentTime + i * 0.09;
        osc.start(start);
        osc.stop(start + 0.08);
      });
    }

    function getAreaRunSeconds(key) {
      const n = Number(areaRunTimes[key]);
      if (!Number.isFinite(n) || n < 0) return 0;
      return Math.trunc(n);
    }

    function clampAreaRunInput(value) {
      let n = Number(value);
      if (!Number.isFinite(n)) n = 0;
      n = Math.trunc(n);
      if (n < 0) n = 0;
      if (n > 86400) n = 86400;
      return n;
    }

    function renderAreaTimeInputs() {
      const grid = document.getElementById("areaTimeGrid");
      if (!grid) return;
      grid.innerHTML = stages.map(item => {
        const key = stageKey(item);
        if (areaRunTimes[key] === undefined) areaRunTimes[key] = 0;
        return `
          <div class="area-time-item">
            <div class="area-time-title">
              <span>${item.difficulty} ${item.stage}</span>
              <span>箱Lv ${item.boxLevel}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">
              <input type="number" min="0" max="86400" step="1" value="${areaRunTimes[key]}" inputmode="numeric"
                oninput="setAreaRunTime('${key}', this.value)"
                onchange="setAreaRunTime('${key}', this.value)" />
              <span style="color:var(--muted);font-weight:800;">秒</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function setAreaRunTime(key, value) {
      const fixed = clampAreaRunInput(value);
      areaRunTimes[key] = fixed;
      const grid = document.getElementById("areaTimeGrid");
      if (grid) {
        const inputs = grid.querySelectorAll("input");
        inputs.forEach(input => {
          const attr = input.getAttribute("oninput") || "";
          if (attr.includes(`'${key}'`) && Number(input.value) !== fixed) input.value = fixed;
        });
      }
      updateAll();
    }

    function toggleAreaTimes() {
      const content = document.getElementById("areaTimeContent");
      if (!content) return;
      content.classList.toggle("open");
      const arrow = document.getElementById("areaToggleArrow");
      if (arrow) arrow.textContent = content.classList.contains("open") ? "▼" : "▶";
    }

    function exportAreaTimesCsv() {
      const headers = ["difficulty", "stage", "boxLevel", "runSeconds"];
      const rows = stages.map(item => {
        const key = stageKey(item);
        return [item.difficulty, item.stage, item.boxLevel, getAreaRunSeconds(key)];
      });
      const csv = [headers, ...rows].map(row => row.map(csvEscape).join(",")).join("\r\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}${String(now.getSeconds()).padStart(2,"0")}`;
      a.href = url;
      a.download = `taskbar_hero_area_times_${stamp}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];
        if (ch === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
        } else if (ch === '"') {
          inQuotes = !inQuotes;
        } else if (ch === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result;
    }

    function importAreaTimesCsvText(text) {
      const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/).filter(line => line.trim() !== "");
      if (lines.length <= 1) return;
      const headers = parseCsvLine(lines[0]).map(h => h.trim());
      const idxDifficulty = headers.indexOf("difficulty");
      const idxStage = headers.indexOf("stage");
      const idxRun = headers.indexOf("runSeconds");
      if (idxDifficulty === -1 || idxStage === -1 || idxRun === -1) {
        alert("CSV形式が違うよ。時間出力で保存したCSVを使ってね。");
        return;
      }
      for (const line of lines.slice(1)) {
        const cols = parseCsvLine(line);
        const item = stages.find(s => s.difficulty === cols[idxDifficulty] && s.stage === cols[idxStage]);
        if (!item) continue;
        areaRunTimes[stageKey(item)] = clampAreaRunInput(cols[idxRun]);
      }
      renderAreaTimeInputs();
      updateAll();
    }

    function setupAreaTimeImport() {
      const input = document.getElementById("areaTimeCsvInput");
      if (!input || input.dataset.ready === "1") return;
      input.dataset.ready = "1";
      input.addEventListener("change", () => {
        const file = input.files && input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          importAreaTimesCsvText(String(reader.result || ""));
          input.value = "";
        };
        reader.readAsText(file, "utf-8");
      });
    }

    function formatShortSeconds(seconds) {
      seconds = Math.max(0, Math.ceil(seconds));
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      if (m > 0) return `${m}分${s}秒`;
      return `${s}秒`;
    }


    function setPreset(minutes) {
      cooldownInput.value = minutes;
      syncCooldownInput();
    }

    function render() {
      grid.innerHTML = "";
      stages.forEach(item => {
        const key = stageKey(item);
        if (!timers[key]) {
          timers[key] = {
            dropped: false,
            ready: false,
            endTime: null,
            notified: false,
          };
        }

        const state = timers[key];
        const div = document.createElement("div");
        div.className = `stage ${difficultyClass(item.difficulty)} ${state.ready ? "ready" : state.dropped ? "waiting" : ""}`;
        div.id = `card-${key}`;

        div.innerHTML = `
          <div class="stage-header">
            <div>
              <div class="difficulty">${item.difficulty}</div>
              <div class="stage-name">${item.stage}</div>
            </div>
            <div class="box-level">箱レベル: ${item.boxLevel}</div>
          </div>
          <div class="timer" id="timer-${key}">--:--</div>
          <div class="status" id="status-${key}">未ドロップ</div>
          <div class="simple-info-stack">
            <div class="run-time-label" id="runtime-${key}"></div>
            <div class="last-stage-drop" id="lastdrop-${key}"></div>
          </div>
          <div class="stage-actions">
            <button id="drop-${key}" class="drop-btn" onclick="markDropped('${key}')">ドロップ</button>
            <button class="manual-ready" onclick="resetStage('${key}')" title="個別リセット">🗑️</button>
          </div>
        `;
        grid.appendChild(div);
      });
      updateAll();
      renderLogs();
      renderAreaTimeInputs();
      setupAreaTimeImport();
    }

    function getStageByKey(key) {
      return stages.find(item => stageKey(item) === key);
    }


    function toggleChestEffect() {
      chestEffectEnabled = !chestEffectEnabled;
      const btn = document.getElementById("chestEffectBtn");
      if (btn) btn.textContent = chestEffectEnabled ? "宝箱演出ON" : "宝箱演出OFF";
    }

    function rollEffectByTable(table) {
      const r = Math.random() * 100;
      let sum = 0;
      for (const row of table) {
        sum += row.rate;
        if (r < sum) return row.color;
      }
      return table[table.length - 1].color;
    }

    function rollEffectItemColor(chestColor) {
      const tables = {
        blue: [
          { color: "white", rate: 64 },
          { color: "yellow", rate: 20 },
          { color: "red", rate: 10 },
          { color: "purple", rate: 5 },
          { color: "rainbow", rate: 1 }
        ],
        yellow: [
          { color: "yellow", rate: 65 },
          { color: "red", rate: 20 },
          { color: "purple", rate: 10 },
          { color: "rainbow", rate: 5 }
        ],
        red: [
          { color: "red", rate: 70 },
          { color: "purple", rate: 20 },
          { color: "rainbow", rate: 10 }
        ],
        purple: [
          { color: "purple", rate: 50 },
          { color: "rainbow", rate: 50 }
        ],
        rainbow: [
          { color: "rainbow", rate: 100 }
        ]
      };

      const rolled = rollEffectByTable(tables[chestColor]);
      if (rolled === "purple") {
        const special = Math.random();
        if (special < 0.25) return "boots";
        if (special < 0.50) return "crystal";
        return "purple";
      }
      return rolled;
    }

    function effectChestColorByElapsed(seconds) {
      const r = Math.random() * 100;

      // 30分未満
      if (seconds < 30 * 60) {
        if (r < 1) return "rainbow";
        if (r < 11) return "purple";   // 10%
        if (r < 26) return "red";      // 15%
        if (r < 46) return "yellow";   // 20%
        return "blue";                 // 54%
      }

      // 30分以上1時間未満
      if (seconds < 60 * 60) {
        if (r < 1) return "rainbow";
        if (r < 16) return "purple";   // 15%
        if (r < 46) return "red";      // 30%
        return "yellow";               // 54%
      }

      // 1時間以上
      if (r < 1) return "rainbow";     // 1%
      if (r < 26) return "purple";     // 25%
      return "red";                    // 74%
    }

    function getEffectItemCssColor(color) {
      if (color === "white") return "#b0b0b0";
      if (color === "yellow") return "#ffd84d";
      if (color === "red") return "#ff3b4f";
      if (color === "purple" || color === "boots") return "#a45cff";
      if (color === "crystal") return "#9ff8ff";
      return "#ffffff";
    }

    function triggerEffectFlash() {
      const flash = document.getElementById("screenFlash");
      if (!flash) return;
      flash.classList.remove("flash");
      void flash.offsetWidth;
      flash.classList.add("flash");
    }

    function applyEffectChestColor(chestColor) {
      const lid = document.getElementById("effectChestLid");
      const box = document.getElementById("effectChestBox");
      if (!lid || !box) return;

      const colors = {
        blue: "linear-gradient(180deg, #3f83cf, #245690)",
        yellow: "linear-gradient(180deg, #d0a24a, #8f6820)",
        red: "linear-gradient(180deg, #b93542, #741722)",
        purple: "linear-gradient(180deg, #8050b2, #472468)",
        rainbow: "linear-gradient(90deg, #ff3b4f, #ffb13b, #fff23b, #38d47a, #2f8cff, #a45cff, #ff3b4f)"
      };

      lid.style.background = colors[chestColor] || colors.blue;
      box.style.background = colors[chestColor] || colors.blue;
      lid.style.backgroundSize = chestColor === "rainbow" ? "320% 320%" : "";
      box.style.backgroundSize = chestColor === "rainbow" ? "320% 320%" : "";
    }



    function buildDropEffectHtml() {
      return `
        <div id="effectChest" class="effect-chest blue">
          <div class="effect-aura"></div>
          <div id="effectBeam" class="effect-beam"></div>
          <div class="effect-inner-light"></div>
          <div id="effectItem" class="effect-item white"></div>
          <div id="effectChestLid" class="effect-chest-lid"></div>
          <div id="effectChestBox" class="effect-chest-box"></div>
          <div class="effect-lock"></div>
          <div class="effect-sparkles">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      `;
    }


    function playDropEffect(secondsSinceStageDrop) {
      if (!chestEffectEnabled) return;

      const layer = document.getElementById("dropEffectLayer");
      if (!layer) return;

      const chestColor = effectChestColorByElapsed(secondsSinceStageDrop || 0);
      const itemColor = rollEffectItemColor(chestColor);
      const itemCssColor = getEffectItemCssColor(itemColor);

      clearTimeout(chestEffectTimer);

      // スマホ対策：前回の演出DOMを破棄して、毎回新品を作る
      layer.classList.remove("show");
      layer.style.display = "none";
      layer.innerHTML = buildDropEffectHtml();

      const chest = document.getElementById("effectChest");
      const item = document.getElementById("effectItem");
      const beam = document.getElementById("effectBeam");
      if (!chest || !item || !beam) return;

      chest.className = `effect-chest ${chestColor}`;
      item.className = `effect-item ${itemColor}`;
      chest.style.setProperty("--item-color", itemCssColor);
      beam.style.setProperty("--item-color", itemCssColor);
      applyEffectChestColor(chestColor);

      if (chestColor === "rainbow" || itemColor === "rainbow") {
        triggerEffectFlash();
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          layer.style.display = "block";
          layer.classList.add("show");
        });
      });

      chestEffectTimer = setTimeout(() => {
        layer.classList.remove("show");
        layer.style.display = "none";
        layer.innerHTML = "";
      }, 3100);
    }


    function markDropped(key) {
      syncCooldownInput();

      const item = getStageByKey(key);
      const now = Date.now();
      const lastSameBoxDrop = lastDropByBoxLevel[item.boxLevel];
      const previousStageDrop = lastDropByStage[key];
      const secondsSinceSameBox = lastSameBoxDrop ? Math.round((now - lastSameBoxDrop) / 1000) : null;
      const secondsSinceStageDrop = previousStageDrop ? Math.round((now - previousStageDrop) / 1000) : 0;

      dropLogs.unshift({
        id: dropLogs.length + 1,
        timestamp: now,
        difficulty: item.difficulty,
        stage: item.stage,
        boxLevel: item.boxLevel,
        secondsSinceSameBox,
      });

      lastDropByBoxLevel[item.boxLevel] = now;
      lastDropByStage[key] = now;
      globalLastDropTime = now;

      timers[key] = {
        dropped: true,
        ready: false,
        endTime: now + cooldownMinutes * 60 * 1000,
        notified: false,
      };
      areaRunNotified[key] = false;

      playDropEffect(secondsSinceStageDrop);
      updateAll();
      renderLogs();
    }

    function resetStage(key) {
      timers[key] = {
        dropped: false,
        ready: false,
        endTime: null,
        notified: false,
      };
      areaRunNotified[key] = false;
      delete lastDropByStage[key];
      updateAll();
    }

    function resetAll() {
      for (const key of Object.keys(timers)) {
        timers[key] = {
          dropped: false,
          ready: false,
          endTime: null,
          notified: false,
        };
      }

      // 各カードの前回ドロップ経過表示も消す
      lastDropByStage = {};
      areaRunNotified = {};

      updateAll();
    }

    function toggleMute() {
      muted = !muted;
      muteBtn.textContent = muted ? "🔇" : "🔊";
      muteBtn.title = muted ? "ミュート中" : "サウンドON";
    }

    volumeSlider.addEventListener("input", () => {
      volume = Number(volumeSlider.value) / 100;
      volumeLabel.textContent = volumeSlider.value;
    });

    function playSound() {
      if (muted || volume <= 0) return;

      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const gain = ctx.createGain();
      gain.gain.value = volume * 0.25;
      gain.connect(ctx.destination);

      const notes = [880, 1175, 1568];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.value = freq;
        osc.connect(gain);
        const start = ctx.currentTime + i * 0.12;
        osc.start(start);
        osc.stop(start + 0.1);
      });
    }

    function testSound() {
      playSound();
    }

    function formatTime(ms) {
      if (ms <= 0) return "00:00";
      const total = Math.ceil(ms / 1000);
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function formatDateTime(ms) {
      const d = new Date(ms);
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return `${y}/${mo}/${da} ${h}:${mi}:${s}`;
    }

    function formatSeconds(seconds) {
      if (seconds === null || seconds === undefined) return "初回";
      return `${seconds}秒後`;
    }

    function formatElapsed(ms) {
      if (ms < 0) ms = 0;
      const total = Math.floor(ms / 1000);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      return `${h}時間${m}分${s}秒`;
    }

    function formatElapsedMinutesSeconds(ms) {
      if (ms < 0) ms = 0;
      const total = Math.floor(ms / 1000);
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}分${s}秒`;
    }

    function updateAll() {
      const now = Date.now();
      const globalLastDropElapsed = document.getElementById("globalLastDropElapsed");
      if (globalLastDropElapsed) {
        globalLastDropElapsed.textContent = globalLastDropTime ? formatElapsed(now - globalLastDropTime) : "未記録";
      }

      for (const item of stages) {
        const key = stageKey(item);
        const state = timers[key];
        const card = document.getElementById(`card-${key}`);
        const timer = document.getElementById(`timer-${key}`);
        const status = document.getElementById(`status-${key}`);
        const runtime = document.getElementById(`runtime-${key}`);
        const lastDrop = document.getElementById(`lastdrop-${key}`);
        const dropBtn = document.getElementById(`drop-${key}`);

        if (!card || !timer || !status || !dropBtn || !lastDrop || !runtime) continue;

        const stageLastTime = lastDropByStage[key];
        if (stageLastTime && now - stageLastTime <= 600 * 60 * 1000) {
          lastDrop.textContent = `${document.body.classList.contains("simple-view") ? "前回：" : "最終ドロップから："}${formatElapsedMinutesSeconds(now - stageLastTime)}`;
        } else {
          lastDrop.textContent = "";
        }

        card.classList.remove("ready", "waiting", "runnable");
        status.classList.remove("runnable-blink");
        runtime.textContent = "";
        dropBtn.classList.remove("dropped");

        if (!state.dropped && !state.ready) {
          timer.textContent = "--:--";
          status.textContent = "未ドロップ";
          dropBtn.textContent = "ドロップ";
          continue;
        }

        if (state.dropped && state.endTime) {
          const left = state.endTime - now;

          if (left <= 0) {
            state.dropped = false;
            state.ready = true;
            timer.textContent = "READY";
            status.textContent = "クールダウン完了";
            card.classList.add("ready");
            dropBtn.textContent = "再ドロップ";
            if (!state.notified) {
              state.notified = true;
              playSound();
            }
          } else {
            const runSeconds = getAreaRunSeconds(key);
            const runStartLeft = left - runSeconds * 1000;
            timer.textContent = formatTime(left);
            if (runSeconds > 0) {
              if (runStartLeft <= 0) {
                status.textContent = "周回可能";
                status.classList.add("runnable-blink");
                runtime.textContent = "";
                card.classList.add("runnable");
                if (!areaRunNotified[key]) {
                  areaRunNotified[key] = true;
                  playRunReadySound();
                }
              } else {
                status.textContent = "クールダウン中";
                runtime.textContent = document.body.classList.contains("simple-view") ? `周回まで：${formatShortSeconds(runStartLeft / 1000)}` : `周回開始可能まで ${formatShortSeconds(runStartLeft / 1000)}`;
                card.classList.add("waiting");
              }
            } else {
              status.textContent = "クールダウン中";
              card.classList.add("waiting");
            }
            dropBtn.classList.add("dropped");
            dropBtn.textContent = "再ドロップ";
          }
          continue;
        }

        if (state.ready) {
          timer.textContent = "READY";
          status.textContent = "クールダウン完了";
          card.classList.add("ready");
          dropBtn.textContent = "再ドロップ";
        }
      }
    }

    function toggleLog() {
      logContent.classList.toggle("open");
      const arrow = document.getElementById("logToggleArrow");
      if (arrow) arrow.textContent = logContent.classList.contains("open") ? "▼" : "▶";
    }

    function renderLogs() {
      const counts = {};
      stages.forEach(item => counts[item.boxLevel] = 0);
      dropLogs.forEach(log => {
        counts[log.boxLevel] = (counts[log.boxLevel] || 0) + 1;
      });

      summaryGrid.innerHTML = Object.keys(counts)
        .sort((a, b) => Number(a) - Number(b))
        .map(level => `
          <div class="summary-item">
            箱レベル ${level}
            <strong>${counts[level]}回</strong>
          </div>
        `)
        .join("");

      if (dropLogs.length === 0) {
        logTableBody.innerHTML = `
          <tr>
            <td colspan="6">まだログはない</td>
          </tr>
        `;
        return;
      }

      logTableBody.innerHTML = dropLogs.map((log, index) => `
        <tr>
          <td>${dropLogs.length - index}</td>
          <td>${formatDateTime(log.timestamp)}</td>
          <td>${log.difficulty}</td>
          <td>${log.stage}</td>
          <td>${log.boxLevel}</td>
          <td>${formatSeconds(log.secondsSinceSameBox)}</td>
        </tr>
      `).join("");
    }


    function clearLogs() {
      dropLogs = [];
      lastDropByBoxLevel = {};
      lastDropByStage = {};
      areaRunNotified = {};
      globalLastDropTime = null;
      renderLogs();
      updateAll();
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      if (/[",\n\r]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function downloadCsv() {
      const headers = ["番号", "時刻", "難易度", "ステージ", "箱レベル", "同じ箱レベルの前回から"];
      const rows = dropLogs.slice().reverse().map((log, index) => [
        index + 1,
        formatDateTime(log.timestamp),
        log.difficulty,
        log.stage,
        log.boxLevel,
        formatSeconds(log.secondsSinceSameBox)
      ]);

      const csv = [headers, ...rows]
        .map(row => row.map(csvEscape).join(","))
        .join("\r\n");

      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}${String(now.getSeconds()).padStart(2,"0")}`;
      a.href = url;
      a.download = `taskbar_hero_drop_log_${stamp}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    render();
    setInterval(updateAll, 250);
  
    // シンプル / フルサイズ切替
    let simpleView = false;

    function applySimpleView() {
      const grid = document.getElementById("stageGrid");
      const btn = document.getElementById("viewToggleBtn");

      document.body.classList.toggle("simple-view", simpleView);

      if (grid) {
        grid.classList.toggle("compact", simpleView);
      }

      if (btn) {
        btn.textContent = simpleView ? "フルサイズ" : "シンプル";
      }
    }

    function toggleCompactView() {
      simpleView = !simpleView;
      applySimpleView();
    }

    function setupViewToggleButton() {
      const btn = document.getElementById("viewToggleBtn");
      if (!btn || btn.dataset.ready === "1") return;

      btn.dataset.ready = "1";
      btn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleCompactView();
      });

      btn.addEventListener("touchend", (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleCompactView();
      }, { passive: false });

      applySimpleView();
    }

    setupViewToggleButton();
    window.addEventListener("DOMContentLoaded", setupViewToggleButton);

</script>
</body>
